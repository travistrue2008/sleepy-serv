name: Publish to NPM

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-24.04

    environment: publish

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Authenticate with GitHub App
        id: app-token
        uses: peter-murray/workflow-application-token-action@v3
        with:
          application_id: ${{ secrets.GH_APP_ID }}
          application_private_key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ vars.BUN_VERSION }}

      - name: Cache Dependencies
        uses: actions/cache@v3
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('bun.lock') }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Update package.json version
        run: |
          bun pm version ${{ github.event.release.tag_name }} --cwd ./packages/client
          bun pm version ${{ github.event.release.tag_name }} --cwd ./packages/server

      - name: Commit package.json
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          git config user.name 'Automated Publisher'
          git config user.email 'automated-publisher[bot]@users.noreply.github.com'
          git add packages/client/package.json packages/server/package.json
          git commit -m "Updated package.json version to ${{ github.event.release.tag_name }}"
          git push origin HEAD:main

      - name: Publish server package
        working-directory: packages/server
        run: bunx npm@11 publish

      - name: Publish client package
        working-directory: packages/client
        run: bunx npm@11 publish
